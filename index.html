<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>LNDN Meets</title>
    <!-- Include premium font for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
  </head>
  <body>
    <div id="app">
      <div id="map"></div>
      
      <!-- Premium Glassmorphism UI Panel -->
      <div id="ui-layer">
        <header style="display: flex; justify-content: space-between; align-items: flex-start;">
          <div>
            <h1>LNDN Meets</h1>
            <p>Curated spots equipped with parking for the car community.</p>
          </div>
          <div id="auth-section">
            <button id="login-btn" class="filter-btn" style="background: var(--accent-color); color: #000; border-color: var(--accent-color);">Sign In</button>
            <div id="user-info" class="hidden" style="font-size: 0.75rem;">
              <span id="user-name"></span>
              <button id="logout-btn" class="filter-btn" style="padding: 3px 8px; margin-top: 4px;">Log Out</button>
            </div>
          </div>
        </header>
        
        <!-- Premium Toast Notification Area -->
        <div id="toast-container" class="hidden"></div>
        
        <div class="filters">
          <button class="filter-btn active" data-type="all">All Spots</button>
          <button class="filter-btn" data-type="cafe">Cafes</button>
          <button class="filter-btn" data-type="pub">Pubs</button>
        </div>
        
        <div id="spot-details" class="glass-panel hidden">
          <!-- Dynamic Content Rendered via JS -->
        </div>
      </div>
    </div>
    <script type="module" src="/main.js"></script>
  </body>
</html>
